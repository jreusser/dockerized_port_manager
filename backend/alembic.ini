# A generic, single database configuration file.

[alembic]
script_location = alembic
prepend_sys_path = .

# Database URL — overridden at runtime by the DATABASE_URL environment variable
# (see alembic/env.py). Do NOT put real credentials here.
sqlalchemy.url = postgresql+asyncpg://user:password@localhost/dbname

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
